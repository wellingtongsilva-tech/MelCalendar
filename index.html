<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Mel 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons for UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 text-slate-800 font-sans flex flex-col min-h-screen">

    <!-- Fixed Header -->
    <header class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-gray-200 z-50 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo / Title -->
                <div class="flex-shrink-0 flex items-center gap-2">
                    <i class="ph-fill ph-calendar-heart text-indigo-600 text-3xl"></i>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600 hidden sm:block">
                        Agenda Mel 2026
                    </h1>
                </div>

                <!-- Search Bar -->
                <div class="flex-1 max-w-lg mx-4">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-magnifying-glass text-gray-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        </div>
                        <input type="text" id="search-input" 
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-full leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all sm:text-sm" 
                            placeholder="Buscar eventos...">
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-3">
                    <button id="btn-today" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-full shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                        Hoje
                    </button>
                    <!-- Loading Indicator -->
                    <div id="loading-indicator" class="hidden">
                        <i class="ph ph-spinner animate-spin text-indigo-600 text-2xl"></i>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Days of week header -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 border-t border-gray-100 bg-white">
            <div class="grid grid-cols-7 gap-px text-center py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                <div>Segunda</div>
                <div>Terça</div>
                <div>Quarta</div>
                <div>Quinta</div>
                <div>Sexta</div>
                <div class="text-indigo-500">Sábado</div>
                <div class="text-indigo-500">Domingo</div>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-1 mt-28 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 pb-12">
        <div id="calendar-root" class="flex flex-col gap-4">
            <!-- Weeks will be rendered here by JS -->
        </div>
    </main>

    <script src="api.js"></script>
    <script src="calendar.js"></script>
</body>
</html>
