<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Mel 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons for UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 text-slate-800 font-sans flex flex-col min-h-screen">

    <!-- Fixed Header -->
    <header class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-gray-200 z-50 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo / Title -->
                <div class="flex-shrink-0 flex items-center gap-2">
                    <i class="ph-fill ph-calendar-heart text-indigo-600 text-3xl"></i>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600 hidden sm:block">
                        Agenda Mel 2026
                    </h1>
                </div>

                <!-- Search Bar -->
                <div class="flex-1 max-w-lg mx-4">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-magnifying-glass text-gray-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        </div>
                        <input type="text" id="search-input" 
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-full leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all sm:text-sm" 
                            placeholder="Buscar eventos...">
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-2 sm:gap-3">
                    <button id="btn-add-event" class="inline-flex items-center justify-center w-10 h-10 sm:w-auto sm:px-4 sm:py-2 border border-transparent text-sm font-medium rounded-full shadow-sm text-white bg-violet-600 hover:bg-violet-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-violet-500 transition-colors" title="Novo Evento">
                        <i class="ph ph-plus text-xl sm:mr-2"></i>
                        <span class="hidden sm:inline">Novo Evento</span>
                    </button>
                    <button id="btn-today" class="hidden sm:inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-full shadow-sm text-indigo-700 bg-indigo-100 hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                        Hoje
                    </button>
                    <!-- Loading Indicator -->
                    <div id="loading-indicator" class="hidden">
                        <i class="ph ph-spinner animate-spin text-indigo-600 text-2xl"></i>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Days of week header -->
        <div class="max-w-7xl mx-auto px-1 sm:px-6 lg:px-8 border-t border-gray-100 bg-white">
            <div class="grid grid-cols-7 gap-px text-center py-2 text-[10px] sm:text-xs font-semibold text-gray-500 uppercase tracking-wider">
                <div><span class="hidden sm:inline">Segunda</span><span class="sm:hidden">Seg</span></div>
                <div><span class="hidden sm:inline">Terça</span><span class="sm:hidden">Ter</span></div>
                <div><span class="hidden sm:inline">Quarta</span><span class="sm:hidden">Qua</span></div>
                <div><span class="hidden sm:inline">Quinta</span><span class="sm:hidden">Qui</span></div>
                <div><span class="hidden sm:inline">Sexta</span><span class="sm:hidden">Sex</span></div>
                <div class="text-indigo-500"><span class="hidden sm:inline">Sábado</span><span class="sm:hidden">Sáb</span></div>
                <div class="text-indigo-500"><span class="hidden sm:inline">Domingo</span><span class="sm:hidden">Dom</span></div>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-1 mt-28 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 pb-12">
        <div id="calendar-root" class="flex flex-col gap-4">
            <!-- Weeks will be rendered here by JS -->
        </div>
    </main>

    <!-- Add Event Modal -->
    <div id="add-event-modal" class="hidden fixed inset-0 z-[100] overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" id="modal-overlay"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <form id="add-event-form" class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4" id="modal-title">Novo Evento</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label for="event-title" class="block text-sm font-medium text-gray-700">Título</label>
                            <input type="text" id="event-title" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                        
                        <div>
                            <label for="event-desc" class="block text-sm font-medium text-gray-700">Descrição</label>
                            <textarea id="event-desc" rows="2" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="event-start" class="block text-sm font-medium text-gray-700">Data Início</label>
                                <input type="date" id="event-start" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div>
                                <label for="event-end" class="block text-sm font-medium text-gray-700">Data Fim (Opcional)</label>
                                <input type="date" id="event-end" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                        </div>
                    </div>
                </form>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 flex flex-col-reverse sm:flex-row-reverse gap-2 sm:gap-0">
                    <button type="button" id="btn-save-event" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm">
                        Salvar
                    </button>
                    <button type="button" id="btn-cancel-event" class="w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:w-auto sm:text-sm">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="calendar.js"></script>
</body>
</html>
